openapi: 3.0.0
info:
  title: Organization Management API
  description: API for managing organizations, departments, teams, and user assignments.
  version: 1.0.0

tags:
  - name: Organization Management
    description: Manage organizations and their structure.
  - name: Department Management
    description: Create, read, update, and delete departments.
  - name: User Assignment
    description: Assign users to departments or teams.
  - name: Survey Management
    description: Assign surveys to departments or teams.

paths:
  /organizations:
    post:
      tags:
        - Organization Management
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    get:
      tags:
        - Organization Management
      summary: Get all organizations
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

  /organizations/search:
    get:
      tags:
        - Organization Management
      summary: Search organizations by name or type
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [Company, Department, Team]
      responses:
        '200':
          description: Matching organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

  /organizations/{id}:
    get:
      tags:
        - Organization Management
      summary: Get details of an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    put:
      tags:
        - Organization Management
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: Organization updated successfully
    delete:
      tags:
        - Organization Management
      summary: Delete an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Organization deleted successfully

  /organizations/{id}/children:
    get:
      tags:
        - Organization Management
      summary: Get child departments or teams of an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of child departments or teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

  /departments:
    post:
      tags:
        - Department Management
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Department created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    get:
      tags:
        - Department Management
      summary: Get all departments
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

  /departments/{id}:
    get:
      tags:
        - Department Management
      summary: Get department details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Department details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    put:
      tags:
        - Department Management
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: Department updated
    delete:
      tags:
        - Department Management
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Department deleted

  /organizations/{id}/assign-user/{userId}:
    post:
      tags:
        - User Assignment
      summary: Assign a user to a department or team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User assigned successfully

  /organizations/{id}/remove-user/{userId}:
    delete:
      tags:
        - User Assignment
      summary: Remove a user from a department or team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User removed successfully

  /organizations/{id}/assign-survey/{surveyId}:
    post:
      tags:
        - Survey Management
      summary: Assign a survey to a department or team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Survey assigned successfully

components:
  schemas:
    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [Company, Department, Team]
        parentOrganizationId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    OrganizationCreate:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [Company, Department, Team]
        parentOrganizationId:
          type: integer
          nullable: true

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [Company, Department, Team]
        parentOrganizationId:
          type: integer
          nullable: true
